services:
  redis:
    image: redis:7.2-bookworm
    container_name: redis
    restart: always
    command: redis-server --requirepass ${REDIS_PASSWORD:-verysecretpassword123}
    ports:
      - "6379:6379"               # optional: remove if only internal access needed
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "--pass", "${REDIS_PASSWORD:-verysecretpassword123}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  redisinsight:
    image: redis/redisinsight:latest
    container_name: redis-insight
    restart: always
    ports:
      - "5540:5540"               # http://localhost:5540
    volumes:
      - redisinsight_data:/data   # persists connections, settings, etc.
    depends_on:
      - redis

volumes:
  redis_data:
  redisinsight_data:
