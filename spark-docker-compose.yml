services:
  spark-master:
    image: apache/spark:4.0.2   # or more specific: apache/spark:4.0.2-scala2.13-java17-python3-ubuntu
    container_name: spark-master
    ports:
      - "8081:8080"   # Master UI: http://localhost:8080
      - "7077:7077"   # Submit / connect here
    environment:
      - SPARK_MODE=master
      - SPARK_RPC_AUTHENTICATION_ENABLED=no
      - SPARK_RPC_ENCRYPTION_ENABLED=no
      - SPARK_LOCAL_STORAGE_ENCRYPTION_ENABLED=no
      - SPARK_SSL_ENABLED=no
    volumes:
      - ./data:/opt/spark/data   # optional shared data

  spark-worker-1:
    image: apache/spark:4.0.2
    container_name: spark-worker-1
    depends_on:
      - spark-master
    environment:
      - SPARK_MODE=worker
      - SPARK_MASTER_URL=spark://spark-master:7077
      - SPARK_WORKER_CORES=2
      - SPARK_WORKER_MEMORY=2g
    volumes:
      - ./data:/opt/spark/data

# Optional: Add more workers by copying spark-worker-1 and adjusting names/cores/memory
