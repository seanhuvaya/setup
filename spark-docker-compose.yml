services:
  spark-master:
    image: bitnami/spark:3.5   # or :latest / :4.0 if you prefer newer
    container_name: spark-master
    ports:
      - "8080:8080"      # Spark Master UI → http://localhost:8080
      - "7077:7077"      # Spark master port (this is what you connect to)
    environment:
      - SPARK_MODE=master
      - SPARK_RPC_AUTHENTICATION_ENABLED=no
      - SPARK_RPC_ENCRYPTION_ENABLED=no
      - SPARK_LOCAL_STORAGE_ENCRYPTION_ENABLED=no
      - SPARK_SSL_ENABLED=no
    volumes:
      - ./data:/opt/bitnami/spark/data   # optional – shared data dir

  spark-worker-1:
    image: bitnami/spark:3.5
    depends_on:
      - spark-master
    environment:
      - SPARK_MODE=worker
      - SPARK_MASTER_URL=spark://spark-master:7077
      - SPARK_WORKER_CORES=2
      - SPARK_WORKER_MEMORY=2g
    volumes:
      - ./data:/opt/bitnami/spark/data
