version: '3.8'

services:
  spark-master:
    image: apache/spark:4.0.2   # or apache/spark:4.0.2-scala2.13-java17-python3-r-ubuntu for full Python/R
    container_name: spark-master
    ports:
      - "8081:8080"   # Spark Master UI → http://localhost:8080
      - "7077:7077"   # Submit / connect here
    environment:
      - SPARK_NO_DAEMONIZE=true   # ← important: keeps process in foreground (prevents immediate exit)
    command: /opt/spark/bin/spark-class org.apache.spark.deploy.master.Master   # ← starts master
    volumes:
      - ./data:/opt/spark/data   # optional

  spark-worker-1:
    image: apache/spark:4.0.2
    container_name: spark-worker-1
    depends_on:
      - spark-master
    environment:
      - SPARK_LOCAL_IP=0.0.0.0
      - SPARK_MASTER_HOST=spark-master
      - SPARK_MASTER_PORT=7077
    command: /opt/spark/bin/spark-class org.apache.spark.deploy.worker.Worker spark://spark-master:7077   # ← starts worker, points to master
    volumes:
      - ./data:/opt/spark/data
